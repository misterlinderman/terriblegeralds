# Railway build — Dockerfile is primary (see /Dockerfile)
# This file is a fallback if Nixpacks is used without Docker.

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = ["npm ci --prefix server"]

[phases.build]
cmds = ["npm run build --prefix server"]

[start]
cmd = "node server/dist/index.js"
